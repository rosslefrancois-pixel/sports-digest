name: Daily Sports Digest

on:
  schedule:
    # 11:00 UTC ≈ 7:00 AM in Auburn during EDT (≈ 6:00 AM during EST).
    - cron: '0 11 * * *'
  workflow_dispatch: {}      # lets you run it on demand from the Actions tab

permissions:
  contents: write            # needed so the job can commit index.html

concurrency:
  group: daily-digest
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate today's digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate.py

      - name: Commit if the page changed
        run: |
          git config user.name  "digest-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --staged --quiet; then
            echo "No changes today."
          else
            git commit -m "Daily digest: $(date -u +%Y-%m-%d)"
            git push
          fi
